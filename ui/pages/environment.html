<header
  class="bg-[#131313] text-[#C3C0FF] sticky top-0 flex justify-between items-center w-full px-6 py-4 z-50"
>
  <h1 class="font-headline text-2xl font-bold tracking-tight text-on-surface">
    Environment Settings
  </h1>
</header>

<main
  class="flex-grow flex flex-col gap-8 p-6 md:px-8 md:pt-4 max-w-5xl mx-auto w-full"
>
  <!-- ENVIRONMENT FORM CARD -->
  <section
    class="w-full bg-surface-container-low rounded-xl p-8 shadow-2xl relative overflow-hidden"
  >
    <div class="flex flex-col gap-8">
      <header>
        <p class="text-on-surface-variant text-sm mt-1">
          Configure your testing environments here. These settings will be used
          to populate runner options and environment variables during test
          execution.
        </p>
      </header>
      <!-- FORM GRID (MATCHES RUNNER) -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Site -->
        <div class="flex flex-col gap-2">
          <label
            class="font-headline text-xs font-semibold uppercase tracking-wider text-outline-variant"
          >
            Site
          </label>

          <select
            id="env-site"
            class="bg-surface-container-highest border-none text-on-surface rounded-lg py-3 px-4 focus:outline-none focus:ring-2 focus:ring-primaryRing focus:ring-offset-2 focus:ring-offset-surface transition-all"
          >
            <option value="">--- Please Choose ---</option>
            <option value="arena">Arena</option>
            <option value="portal">Portal</option>
          </select>
        </div>

        <!-- BASE URL -->
        <div class="flex flex-col gap-2 w-full">
          <label
            class="font-headline text-xs font-semibold uppercase tracking-wider text-outline-variant"
          >
            Base URL
          </label>

          <div class="relative">
            <span
              class="material-symbols-outlined absolute left-4 top-3.5 text-outline text-sm"
              >link
            </span>

            <input
              id="env-url"
              type="text"
              placeholder="https://example.com"
              class="w-full bg-surface-container-highest border-none text-on-surface rounded-lg py-3 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-primaryRing focus:ring-offset-2 focus:ring-offset-surface transition-all placeholder:text-outline-variant"
            />
          </div>
        </div>

        <!-- MODE -->
        <div class="flex flex-col gap-2">
          <label
            class="font-headline text-xs font-semibold uppercase tracking-wider text-outline-variant"
          >
            Environment
          </label>

          <select
            id="env-mode"
            class="bg-surface-container-highest border-none text-on-surface rounded-lg py-3 px-4 focus:outline-none focus:ring-2 focus:ring-primaryRing focus:ring-offset-2 focus:ring-offset-surface transition-all"
          >
            <option value="">--- Please Choose ---</option>
            <option value="dev">Dev</option>
            <option value="test">Test</option>
            <option value="qa">QA</option>
            <option value="prod">Prod</option>
          </select>
        </div>

        <!-- USERNAME -->
        <div class="flex flex-col gap-2">
          <label
            class="font-headline text-xs font-semibold uppercase tracking-wider text-outline-variant"
          >
            Username
          </label>

          <input
            id="env-username"
            type="text"
            placeholder="username"
            class="bg-surface-container-highest border-none text-on-surface rounded-lg py-3 px-4 focus:outline-none focus:ring-2 focus:ring-primaryRing focus:ring-offset-2 focus:ring-offset-surface transition-all"
          />
        </div>

        <!-- PASSWORD -->
        <div class="flex flex-col gap-2">
          <label
            class="font-headline text-xs font-semibold uppercase tracking-wider text-outline-variant"
          >
            Password
          </label>

          <input
            id="env-password"
            type="password"
            placeholder="••••••••"
            class="bg-surface-container-highest border-none text-on-surface rounded-lg py-3 px-4 focus:outline-none focus:ring-2 focus:ring-primaryRing focus:ring-offset-2 focus:ring-offset-surface transition-all"
          />
        </div>
      </div>

      <!-- ICON GRID -->
      <div class="flex flex-col gap-4">
        <label
          class="font-headline text-xs font-semibold uppercase tracking-wider text-outline-variant"
        >
          Choose Environment Icon
        </label>

        <div
          id="env-icon-grid"
          class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-4"
        ></div>
      </div>

      <!-- SAVE BUTTON -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div></div>
        <!-- empty first column -->

        <button
          id="env-save"
          class="px-6 py-3 rounded-lg font-headline font-bold bg-surface-container-highest text-white hover:bg-primary-container/80 transition shadow-lg active:scale-95 disabled:opacity-40"
        >
          Save Environment
        </button>
      </div>
    </div>
  </section>

  <!-- CONFIGURED ENVIRONMENTS BELOW (LIKE RUNNER LOG PANEL) -->
  <section class="space-y-4">
    <div class="flex items-center justify-between px-2">
      <h3 class="font-headline text-xl font-bold flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-[#C3C0FF]"></span>
        Configured Environments
      </h3>

      <span id="env-count" class="text-xs font-mono text-outline-variant">
        0 INSTANCES CONFIGURED
      </span>
    </div>

    <div id="env-list" class="space-y-3"></div>
  </section>
</main>
